<VirtualHost *:80>
    ServerName web.localhost
    ServerAlias web.test
    DocumentRoot /var/www/html/laravel/public

    # allow .htaccess overrides
    <Directory /var/www/html/laravel/public>
        AllowOverride All
        Require all granted
    </Directory>

    # Rewrites
    RewriteEngine On
    # If someone hits legacy URLs with /laravel/public, redirect to the docroot equivalent
    RewriteRule ^/?laravel/public/(.*)$ /$1 [R=302,L]

    # Par défaut: tous les .php en PHP 7
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php7.4-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Exception: ce fichier précis en PHP 8
    <Files "index-laravel.php">
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
    </Files>

    # (Option) Un sous-dossier entier en PHP 8
    <Directory "/var/www/html/laravel/public">
        <FilesMatch "\.php$">
            SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
        </FilesMatch>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory "/var/www/html/_features">
        <FilesMatch "\.php$">
            SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
        </FilesMatch>
    </Directory>
</VirtualHost>

