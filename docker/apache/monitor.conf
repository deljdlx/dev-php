<VirtualHost *:80>
    ServerName monitor.localhost
    DocumentRoot /var/www/html/php-monitor

    <Directory /var/www/html/php-monitor>
        AllowOverride All
        Require all granted
    </Directory>

    # Serve PHP files with PHP 8.4 FPM
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Optional: basic caching headers for static assets
    <LocationMatch "\.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>
</VirtualHost>