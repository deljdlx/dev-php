services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      # Pour HTTPS local avec mkcert, décommentez ci-dessous et ajoutez certs:
      # - --entrypoints.websecure.address=:443
      # - --certificatesresolvers.dev.acme.tlschallenge=true
      # - --certificatesresolvers.dev.acme.email=you@example.com
      # - --certificatesresolvers.dev.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # - ./letsencrypt:/letsencrypt
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.localhost`)
      - traefik.http.routers.traefik.entrypoints=web
      - traefik.http.routers.traefik.service=api@internal
      # - traefik.http.routers.traefik.tls=true
      # - traefik.http.routers.traefik.tls.certresolver=dev
    networks:
      - app-net

  web:
    # profiles: ["php8"]
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:80"
    volumes:
      - ../urgo:/var/www/html
      - ../urgo/tmp/xdebug-traces:/var/www/html/tmp/xdebug-traces
      - composer_cache:/tmp/composer
    working_dir: /var/www/html
    environment:
      COMPOSER_HOME: /tmp/composer
      MYSQL_HOST: db
      MYSQL_DATABASE: myurgo
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
      MARIADB_ROOT_PASSWORD: rootpass
      # Elasticsearch endpoint for app logging
      ELASTICSEARCH_URL: http://elasticsearch:9200
      # XDEBUG_MODE: debug,develop
      # XDEBUG_CONFIG: client_host=h+ost.docker.internal client_port=9003
    depends_on:
      - db
      - elasticsearch
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=app-net
      - traefik.http.routers.web.rule=Host(`web.localhost`)
      - traefik.http.routers.web.entrypoints=web
      # - traefik.http.routers.web.tls=true
      # - traefik.http.routers.web.tls.certresolver=dev
      - traefik.http.services.web.loadbalancer.server.port=80

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI Web
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=app-net
      - traefik.http.routers.mailhog.rule=Host(`mailhog.localhost`)
      - traefik.http.routers.mailhog.entrypoints=web
      # - traefik.http.routers.mailhog.tls=true
      - traefik.http.services.mailhog.loadbalancer.server.port=8025

  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    ports:
      - "19999:19999"
    volumes:
      - netdata_data:/var/lib/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    restart: unless-stopped
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=app-net
      - traefik.http.routers.netdata.rule=Host(`netdata.localhost`)
      - traefik.http.routers.netdata.entrypoints=web
      # - traefik.http.routers.netdata.tls=true
      - traefik.http.services.netdata.loadbalancer.server.port=19999

  db:
    image: mariadb:11
    container_name: db
    ports:
      - "3306:3306"
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: myurgo
      MARIADB_USER: root
      MARIADB_PASSWORD: rootpass
      TZ: Europe/Paris
      MARIADB_ROOT_HOST: "%"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb-conf.d:/etc/mysql/conf.d:ro
    networks:
      - app-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.26
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Disable security for local dev simplicity (do not use in production)
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=app-net
      - traefik.http.routers.elasticsearch.rule=Host(`es.localhost`)
      - traefik.http.routers.elasticsearch.entrypoints=web
      # - traefik.http.routers.elasticsearch.tls=true
      - traefik.http.services.elasticsearch.loadbalancer.server.port=9200

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.26
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=app-net
      - traefik.http.routers.kibana.rule=Host(`kibana.localhost`)
      - traefik.http.routers.kibana.entrypoints=web
      # - traefik.http.routers.kibana.tls=true
      - traefik.http.services.kibana.loadbalancer.server.port=5601

  apm-server:
    image: docker.elastic.co/apm/apm-server:7.17.26
    container_name: apm-server
    environment:
      - output.elasticsearch.hosts=["http://elasticsearch:9200"]
      - apm-server.kibana.enabled=true
      - apm-server.kibana.host=http://kibana:5601
    ports:
      - "8200:8200"
    depends_on: [elasticsearch, kibana]
    networks: [app-net]
    labels:
      - traefik.enable=true
      - traefik.docker.network=app-net
      - traefik.http.routers.apm.rule=Host(`apm.localhost`)
      - traefik.http.routers.apm.entrypoints=web
      # - traefik.http.routers.apm.tls=true
      - traefik.http.services.apm.loadbalancer.server.port=8200

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=aaaaaaaaaaaa
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=app-net
      - traefik.http.routers.portainer.rule=Host(`portainer.localhost`)
      - traefik.http.routers.portainer.entrypoints=web
      # - traefik.http.routers.portainer.tls=true
      - traefik.http.services.portainer.loadbalancer.server.port=9000

  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - NC_PUBLIC_URL=http://localhost:8081
      - NC_DISABLE_TELEMETRY=true
      - NC_ADMIN_EMAIL=foobar@gmail.com
      - NC_ADMIN_PASSWORD=aaaaaaaa
      - NC_AUTH_JWT_SECRET=please_change_me
      - TZ=Europe/Paris
    volumes:
      - nocodb_data:/usr/app/data
    depends_on:
      - db
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=app-net
      - traefik.http.routers.nocodb.rule=Host(`nocodb.localhost`)
      - traefik.http.routers.nocodb.entrypoints=web
      # - traefik.http.routers.nocodb.tls=true
      - traefik.http.services.nocodb.loadbalancer.server.port=8080

volumes:
  db_data:
  composer_cache:
  es_data:
  portainer_data:
  netdata_data:
  nocodb_data:

networks:
  app-net:
    driver: bridge