services:
  web:
    # profiles: ["php8"]
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:80"
    volumes:
      - ../urgo:/var/www/html
      - ../urgo/tmp/xdebug-traces:/var/www/html/tmp/xdebug-traces
      - composer_cache:/tmp/composer
    working_dir: /var/www/html
    environment:
      COMPOSER_HOME: /tmp/composer
      MYSQL_HOST: db
      MYSQL_DATABASE: myurgo
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
      MARIADB_ROOT_PASSWORD: rootpass
      # Elasticsearch endpoint for app logging
      ELASTICSEARCH_URL: http://elasticsearch:9200
      # XDEBUG_MODE: debug,develop
      # XDEBUG_CONFIG: client_host=h+ost.docker.internal client_port=9003
    depends_on:
      - db
      - elasticsearch
    networks:
      - app-net

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI Web
    networks:
      - app-net
  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    ports:
      - "19999:19999"
    volumes:
      - netdata_data:/var/lib/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    restart: unless-stopped
    networks:
      - app-net


  db:
    image: mariadb:11
    container_name: db
    ports:
      - "3306:3306"
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: myurgo
      MARIADB_USER: root
      MARIADB_PASSWORD: rootpass
      TZ: Europe/Paris
      MARIADB_ROOT_HOST: "%"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb-conf.d:/etc/mysql/conf.d:ro
    networks:
      - app-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.26
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Disable security for local dev simplicity (do not use in production)
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - app-net

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.26
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - app-net

  apm-server:
    image: docker.elastic.co/apm/apm-server:7.17.26
    container_name: apm-server
    environment:
      - output.elasticsearch.hosts=["http://elasticsearch:9200"]
      - apm-server.kibana.enabled=true
      - apm-server.kibana.host=http://kibana:5601
    ports:
      - "8200:8200"
    depends_on: [elasticsearch, kibana]
    networks: [app-net]

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=aaaaaaaaaaaa
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # <— MONTER le socket
      - portainer_data:/data                        # <— données persistées
    # Pas besoin de 'command:' (par défaut Portainer parle au socket monté)
    networks:
      - app-net

  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    restart: unless-stopped
    ports:
      - "8081:8080"          # UI NocoDB (ne pas entrer en conflit avec le service web)
    environment:
      - NC_PUBLIC_URL=http://localhost:8081
      - NC_DISABLE_TELEMETRY=true
      - NC_ADMIN_EMAIL=foobar@gmail.com     # à changer si besoin
      - NC_ADMIN_PASSWORD=aaaaaaaa   # à changer en local
      - NC_AUTH_JWT_SECRET=please_change_me
      - TZ=Europe/Paris
    volumes:
      - nocodb_data:/usr/app/data      # base interne (SQLite) persistée
    depends_on:
      - db
    networks:
      - app-net



volumes:
  db_data:
  composer_cache:
  es_data:
  portainer_data:
  netdata_data:
  nocodb_data:

networks:
  app-net:
    driver: bridge